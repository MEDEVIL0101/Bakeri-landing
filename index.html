<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bakeri — Coming Soon</title>
  <meta name="description" content="Bakeri is coming soon. Built for cottage bakers who mean business." />
  <link rel="icon" href="1024.png" />
  <link rel="apple-touch-icon" href="1024.png" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Nunito', system-ui, sans-serif;
      background: #FAF5EE;
      color: #1A0808;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
    }
    .icon {
      width: 88px; height: 88px;
      border-radius: 20px;
      overflow: hidden;
      margin: 0 auto 32px;
      box-shadow: 0 8px 32px rgba(0,0,0,.15);
    }
    .icon img { width: 100%; height: 100%; object-fit: cover; display: block; }
    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      color: #6B1212;
      margin-bottom: 16px;
      line-height: 1.2;
    }
    h1 em { font-style: italic; color: #C9963A; }
    p {
      font-size: 1.1rem;
      color: #8C5858;
      max-width: 380px;
      line-height: 1.7;
      font-weight: 400;
    }
    .footer {
      position: fixed;
      bottom: 24px;
      font-size: .8rem;
      color: rgba(26,8,8,.25);
    }
  </style>
</head>
<body>
  <div class="icon"><img src="1024.png" alt="Bakeri" /></div>
  <h1>Something <em>delicious</em><br>is coming.</h1>
  <p>We're putting the finishing touches on Bakeri. Check back soon.</p>
  <p class="footer">&copy; 2026 Bakeri</p>
</body>
</html>
